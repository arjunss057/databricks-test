name: Lint and Validate Databricks Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black[jupyter] flake8 nbqa
      - name: List files for debugging
        run: |
          pwd
          find . -maxdepth 2 -not -path '*/.*'
      - name: Check formatting with Black
        run: black --check . --include '\.ipynb$'

      - name: Lint with flake8 via nbqa
        run: nbqa flake8 . --extend-ignore=E402,F821 --count --statistics
          
