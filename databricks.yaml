bundle:
  name: simple-bundle

workspace:
  root_path: /Shared/dab-demo/${bundle.name}/${bundle.target}

targets:
  dev:
    mode: development

resources:
  jobs:
    simple-job:
      name: simple-job
      tasks:
        - task_key: run-notebook
          notebook_task:
            notebook_path: ./test_notebook_git.ipynb
          new_cluster:
            spark_version: 13.3.x-scala2.12
            node_type_id: Standard_DS3_v2
            num_workers: 1
            
